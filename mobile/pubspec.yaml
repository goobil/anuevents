name: anuevents_mobile
description: Minimal scaffold for ANU Events Phase 1
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  url_launcher: ^6.3.0
  flutter_riverpod: ^3.0.0
  cloud_firestore: ^6.0.1
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  google_sign_in: ^7.1.1
  firebase_messaging: ^16.0.1
  intl: ^0.20.2
  flutter_local_notifications: ^12.0.4
  firebase_storage: ^13.0.1
  image_picker: ^1.1.3
  shared_preferences: ^2.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
