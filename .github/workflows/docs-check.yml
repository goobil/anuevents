name: Docs CI - lint & linkcheck

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install tools
        run: |
          npm install -g markdownlint-cli@0.33.0 markdown-link-check@3.10.0

      - name: Run markdownlint
        run: |
          echo "Running markdownlint..."
          # Use the repository ignore file to skip vendored docs (Pods, node_modules, etc.)
          markdownlint "**/*.md" --config .github/markdownlint.json --ignore-path .markdownlintignore

      - name: Run link checks
        run: |
          echo "Running markdown-link-check on each markdown file..."
          # Exclude vendored and generated directories from link checks to reduce noise
          find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './mobile/ios/Pods/*' \
            -not -path './mobile/**/Pods/*' \
            -not -path './mobile/.vscode/*' \
            -not -path './firebase/functions/node_modules/*' \
            -print0 | xargs -0 -n1 -P4 -I{} sh -c "markdown-link-check -q '{}' || exit 2"
