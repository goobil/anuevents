name: Docs CI - lint & linkcheck

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install tools
        run: |
          npm install -g markdownlint-cli@0.33.0 markdown-link-check@3.10.0

      - name: Run markdownlint
        run: |
          echo "Running markdownlint..."
          markdownlint "**/*.md" --config .github/markdownlint.json

      - name: Run link checks
        run: |
          echo "Running markdown-link-check on each markdown file..."
          find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' -print0 | xargs -0 -n1 -P4 -I{} sh -c "markdown-link-check -q '{}' || exit 2"
