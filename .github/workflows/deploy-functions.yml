name: Deploy Cloud Functions

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@11

      - name: Authenticate to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          gcloud auth activate-service-account --key-file=service-account.json || true
          firebase login:ci --no-localhost || true
          firebase use --add production || true

      - name: Deploy functions
        working-directory: firebase/functions
        run: npm run deploy --if-present
